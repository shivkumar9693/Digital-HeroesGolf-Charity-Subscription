<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Draw Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root{
            --nf-bg: #141414;
            --nf-bg-2: #0b0b0b;
            --nf-surface: rgba(32,32,32,.78);
            --nf-text: #e5e5e5;
            --nf-muted: rgba(229,229,229,.72);
            --nf-red: #e50914;
            --nf-red-2: #b20710;
            --nf-ring: 0 0 0 .25rem rgba(229, 9, 20, .28);
            --nf-shadow-sm: 0 10px 30px rgba(0,0,0,.35);
            --nf-shadow-md: 0 26px 70px rgba(0,0,0,.55);
            --radius: 18px;
        }

        body{
            background:
                radial-gradient(900px 600px at 15% 0%, rgba(229,9,20,.16), transparent 55%),
                radial-gradient(900px 600px at 85% 10%, rgba(255,255,255,.06), transparent 55%),
                linear-gradient(180deg, var(--nf-bg-2), var(--nf-bg));
            color: var(--nf-text);
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            text-rendering: optimizeLegibility;
        }

        .navbar{
            backdrop-filter: saturate(150%) blur(10px);
        }

        .navbar-toggler:focus{
            box-shadow: var(--nf-ring);
        }

        @media (max-width: 991.98px){
            .navbar .navbar-collapse{
                background: rgba(0,0,0,.62);
                border: 1px solid rgba(255,255,255,.08);
                border-radius: 16px;
                padding: 12px;
                margin-top: 12px;
                box-shadow: var(--nf-shadow-sm);
            }
            .navbar-nav{
                gap: 4px;
            }
            .navbar-nav .nav-link{
                padding: 10px 12px;
                border-radius: 12px;
            }
            .navbar-nav .nav-link.active{
                border-bottom: 0;
                background: rgba(229,9,20,.16);
            }
        }

        .card{
            border: 0;
            border-radius: var(--radius);
            box-shadow: var(--nf-shadow-sm);
            background: linear-gradient(180deg, rgba(40,40,40,.85), rgba(20,20,20,.92));
            color: var(--nf-text);
        }

        .nav-link{
            opacity: .85;
            transition: opacity .18s ease, transform .18s ease;
            font-weight: 600;
            letter-spacing: .2px;
        }
        .nav-link:hover{
            opacity: 1;
            transform: translateY(-1px);
        }
        .nav-link.active{
            opacity: 1;
            border-bottom: 2px solid rgba(229, 9, 20, .9);
        }

        .navbar-dark .navbar-brand,
        .navbar-dark .navbar-nav .nav-link{
            color: rgba(255,255,255,.92);
        }

        .btn{
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease, border-color .15s ease, color .15s ease;
        }
        .btn:active{ transform: translateY(1px); }
        .btn:focus-visible{ box-shadow: var(--nf-ring); }

        .btn-primary{
            background-color: var(--nf-red);
            border-color: var(--nf-red);
            box-shadow: 0 12px 26px rgba(229,9,20,.22);
        }
        .btn-primary:hover{
            background-color: var(--nf-red-2);
            border-color: var(--nf-red-2);
        }
        .btn-outline-light:hover{ background-color: rgba(255,255,255,.10); }

        .table{
            --bs-table-color: var(--nf-text);
            --bs-table-bg: transparent;
            --bs-table-hover-color: var(--nf-text);
            --bs-table-hover-bg: rgba(229,9,20,.08);
        }
        .table thead th{
            letter-spacing: .35px;
            text-transform: uppercase;
            font-size: .78rem;
        }
        .table tbody tr{
            transition: transform .12s ease, background-color .12s ease;
        }
        .table tbody tr:hover{
            transform: translateY(-1px);
        }

        .badge{
            box-shadow: 0 14px 28px rgba(0,0,0,.35);
        }

        .table-dark{
            --bs-table-bg: rgba(0,0,0,.55);
            --bs-table-striped-bg: rgba(255,255,255,.03);
            --bs-table-striped-color: var(--nf-text);
        }

        .container > .d-flex,
        .container > .card{
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp{
            from{ opacity: 0; transform: translateY(10px); }
            to{ opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce){
            *{ animation: none !important; transition: none !important; scroll-behavior: auto !important; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/admin/dashboard">Admin Central</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="adminNav">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item"><a class="nav-link px-3" href="/admin/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/users">Users</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="/admin/draws">Draws</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/charities">Charities</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/winners">Winners</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light rounded-pill fw-bold px-4 w-100">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5 pb-5">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4 pb-2 border-bottom">
        <h1 class="h2 fw-bold text-dark">Draw Orchestration</h1>
        <form th:action="@{/admin/draws/init}" method="post" class="d-inline">
            <button type="submit" class="btn btn-primary fw-bold rounded-pill px-4 py-2">Initialize New Draw</button>
        </form>
    </div>

    <div class="card shadow-sm border-0 mt-4 overflow-hidden">
        <div class="card-body p-0 table-responsive text-nowrap">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark text-nowrap">
                    <tr>
                        <th>Draw ID</th>
                        <th>Period</th>
                        <th>Status</th>
                        <th>Mode</th>
                        <th>Published At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${draws}">
                        <td th:text="${d.id}" class="fw-bold">1</td>
                        <td th:text="${d.month + '/' + d.year}" class="fw-bold">04/2024</td>
                        <td>
                            <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold shadow-sm" th:if="${d.status.name() == 'SIMULATION'}">🛠️ SIMULATION</span>
                            <span class="badge bg-success px-3 py-2 rounded-pill fw-bold shadow-sm" th:if="${d.status.name() == 'PUBLISHED'}">✅ PUBLISHED</span>
                        </td>
                        <td><span class="badge bg-secondary px-3 py-2 rounded-pill" th:text="${d.mode}">RANDOM</span></td>
                        <td th:text="${d.publishedAt}" class="text-secondary small fw-bold">2024-04-01</td>
                        <td>
                            <form th:action="@{/admin/draws/{id}/run(id=${d.id})}" method="post" th:if="${d.status.name() == 'SIMULATION'}">
                                <button type="submit" class="btn btn-sm btn-dark px-4 py-1 rounded-pill fw-bold">Run Simulation</button>
                            </form>
                            <span class="text-muted fw-bold" th:if="${d.status.name() == 'PUBLISHED'}">Algorithm Finalized</span>
                        </td>
                    </tr>
                    <tr th:if="${draws.isEmpty()}">
                        <td colspan="6" class="text-center py-5 fs-5">No draw cycles initialized.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
