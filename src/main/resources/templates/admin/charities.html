<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Charities - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root{
            --bg: #f4f7f6;
            --surface: rgba(255,255,255,0.86);
            --text: #0f172a;
            --shadow-sm: 0 6px 18px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 16px 40px rgba(15, 23, 42, 0.10);
            --ring: 0 0 0 .25rem rgba(13, 110, 253, .20);
            --radius: 16px;
        }

        body{
            background:
                radial-gradient(900px 600px at 12% 0%, rgba(13,110,253,.08), transparent 60%),
                radial-gradient(800px 500px at 92% 10%, rgba(25,135,84,.08), transparent 55%),
                var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            text-rendering: optimizeLegibility;
        }

        .navbar{
            backdrop-filter: saturate(150%) blur(10px);
        }

        .card{
            border: 0;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            background: var(--surface);
        }

        .nav-link{
            opacity: .85;
            transition: opacity .18s ease, transform .18s ease;
            font-weight: 600;
            letter-spacing: .2px;
        }
        .nav-link:hover{
            opacity: 1;
            transform: translateY(-1px);
        }
        .nav-link.active{
            opacity: 1;
            border-bottom: 2px solid rgba(255,255,255,.9);
        }

        .btn{
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease, border-color .15s ease, color .15s ease;
        }
        .btn:active{ transform: translateY(1px); }
        .btn:focus-visible{ box-shadow: var(--ring); }

        .table{
            --bs-table-hover-bg: rgba(13,110,253,.06);
        }
        .table thead th{
            letter-spacing: .35px;
            text-transform: uppercase;
            font-size: .78rem;
        }
        .table tbody tr{
            transition: transform .12s ease, background-color .12s ease;
        }
        .table tbody tr:hover{
            transform: translateY(-1px);
        }

        .badge{
            box-shadow: 0 10px 18px rgba(15,23,42,.08);
        }

        .modal-content{
            animation: popIn .22s ease both;
            transform-origin: 50% 65%;
        }
        @keyframes popIn{
            from{ opacity: 0; transform: translateY(6px) scale(.98); }
            to{ opacity: 1; transform: translateY(0) scale(1); }
        }

        .container > .d-flex,
        .container > .card{
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp{
            from{ opacity: 0; transform: translateY(10px); }
            to{ opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce){
            *{ animation: none !important; transition: none !important; scroll-behavior: auto !important; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/admin/dashboard">Admin Central</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="adminNav">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item"><a class="nav-link px-3" href="/admin/dashboard">📊 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/users">👥 Users</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/draws">🎟️ Draws</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="/admin/charities">❤️ Charities</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/winners">🏆 Winners</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light rounded-pill fw-bold px-4 w-100">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5 pb-5">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4 pb-2 border-bottom">
        <h1 class="h2 fw-bold text-dark">Partner Management</h1>
        <button class="btn btn-primary fw-bold rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addCharityModal">➕ Add Partner</button>
    </div>

    <div class="card shadow-sm border-0 mt-4 overflow-hidden">
        <div class="card-body p-0 table-responsive text-nowrap">
            <table class="table table-hover table-striped mb-0">
                <thead class="table-dark text-nowrap">
                    <tr>
                        <th>Partner ID</th>
                        <th>Alias</th>
                        <th>Visibility</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${charities}">
                        <td th:text="${c.id}" class="fw-bold text-secondary">1</td>
                        <td th:text="${c.name}" class="fw-bold fs-5">Organization Name</td>
                        <td>
                            <span class="badge bg-success px-4 py-2 rounded-pill fw-bold" th:if="${c.featured}">✨ FEATURED</span>
                            <span class="badge bg-secondary px-4 py-2 rounded-pill opacity-75 fw-bold" th:unless="${c.featured}">Standard</span>
                        </td>
                        <td>
                            <form th:action="@{/admin/charities/{id}/toggle-feature(id=${c.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-warning text-dark rounded-pill fw-bold px-3">Toggle Featured</button>
                            </form>
                            <form th:action="@{/admin/charities/{id}/delete(id=${c.id})}" method="post" class="d-inline ms-1">
                                <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill fw-bold px-3" onclick="return confirm('Deleting this charity will remove all associated user selections. Proceed?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${charities.isEmpty()}">
                        <td colspan="4" class="text-center py-5 fs-5">Register first charity program.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Charity Modal -->
<div class="modal fade" id="addCharityModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form th:action="@{/admin/charities/add}" method="post" class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header bg-dark text-white border-0 py-4 px-4" style="border-radius: 20px 20px 0 0;">
                <h4 class="modal-title fw-bold">Register Partner</h4>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-4">
                    <label class="form-label text-secondary fw-bold small text-uppercase">Legal Entity Title</label>
                    <input type="text" name="name" class="form-control bg-light border-0 py-3 rounded-pill px-4" required placeholder="ex. Global Health Initiative">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary fw-bold small text-uppercase">Mission Statement</label>
                    <textarea name="description" class="form-control bg-light border-0 py-3 px-4" style="border-radius: 20px;" rows="4" required placeholder="Focus area?"></textarea>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="submit" class="btn btn-primary fw-bold w-100 py-3 rounded-pill shadow-sm">Sync Partner into Fleet</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
