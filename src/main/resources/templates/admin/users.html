<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Manage Users - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif;}
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-link { opacity: 0.8; transition: opacity 0.2s; font-weight: 500; }
        .nav-link:hover, .nav-link.active { opacity: 1; border-bottom: 2px solid white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/admin/dashboard">Admin Central</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="adminNav">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item"><a class="nav-link px-3" href="/admin/dashboard">📊 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="/admin/users">👥 Users</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/draws">🎟️ Draws</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/charities">❤️ Charities</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/winners">🏆 Winners</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light rounded-pill fw-bold px-4 w-100">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5 pb-5">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4 pb-2 border-bottom">
        <h1 class="h2 fw-bold text-dark">Manage System Users</h1>
    </div>

    <div class="card shadow-sm border-0 mt-4 overflow-hidden">
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover table-striped mb-0 text-nowrap">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}" class="fw-bold text-secondary">1</td>
                        <td th:text="${u.email}">user@test.com</td>
                        <td><span class="badge bg-primary rounded-pill px-3 py-2" th:text="${u.role}">ROLE</span></td>
                        <td>
                            <span class="badge bg-success rounded-pill px-3 py-2" th:if="${u.enabled}">Active Account</span>
                            <span class="badge bg-danger rounded-pill px-3 py-2" th:unless="${u.enabled}">Banned</span>
                        </td>
                        <td th:text="${u.createdAt}" class="text-secondary small fw-bold">2024-01-01</td>
                        <td>
                            <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-sm rounded-pill fw-bold px-4 py-1"
                                        th:classappend="${u.enabled ? 'btn-outline-danger' : 'btn-outline-success'}"
                                        th:text="${u.enabled ? 'Ban' : 'Unban'}"
                                        th:disabled="${u.role.name() == 'ADMIN'}">Toggle</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="6" class="text-center py-5 fs-5">No active users in current database.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
