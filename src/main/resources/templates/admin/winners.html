<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Winners / Payouts - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root{
            --bg: #f4f7f6;
            --surface: rgba(255,255,255,0.86);
            --text: #0f172a;
            --shadow-sm: 0 6px 18px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 16px 40px rgba(15, 23, 42, 0.10);
            --ring: 0 0 0 .25rem rgba(13, 110, 253, .20);
            --radius: 16px;
        }

        body{
            background:
                radial-gradient(900px 600px at 12% 0%, rgba(13,110,253,.08), transparent 60%),
                radial-gradient(800px 500px at 92% 10%, rgba(25,135,84,.08), transparent 55%),
                var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            text-rendering: optimizeLegibility;
        }

        .navbar{
            backdrop-filter: saturate(150%) blur(10px);
        }

        .card{
            border: 0;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            background: var(--surface);
        }

        .nav-link{
            opacity: .85;
            transition: opacity .18s ease, transform .18s ease;
            font-weight: 600;
            letter-spacing: .2px;
        }
        .nav-link:hover{
            opacity: 1;
            transform: translateY(-1px);
        }
        .nav-link.active{
            opacity: 1;
            border-bottom: 2px solid rgba(255,255,255,.9);
        }

        .btn{
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease, border-color .15s ease, color .15s ease;
        }
        .btn:active{ transform: translateY(1px); }
        .btn:focus-visible{ box-shadow: var(--ring); }

        .table{
            --bs-table-hover-bg: rgba(13,110,253,.06);
        }
        .table thead th{
            letter-spacing: .35px;
            text-transform: uppercase;
            font-size: .78rem;
        }
        .table tbody tr{
            transition: transform .12s ease, background-color .12s ease;
        }
        .table tbody tr:hover{
            transform: translateY(-1px);
        }

        .badge{
            box-shadow: 0 10px 18px rgba(15,23,42,.08);
        }

        .container > .d-flex,
        .container > .card{
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp{
            from{ opacity: 0; transform: translateY(10px); }
            to{ opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce){
            *{ animation: none !important; transition: none !important; scroll-behavior: auto !important; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/admin/dashboard">Admin Central</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="adminNav">
            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item"><a class="nav-link px-3" href="/admin/dashboard">📊 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/users">👥 Users</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/draws">🎟️ Draws</a></li>
                <li class="nav-item"><a class="nav-link px-3" href="/admin/charities">❤️ Charities</a></li>
                <li class="nav-item"><a class="nav-link px-3 active" href="/admin/winners">🏆 Winners</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light rounded-pill fw-bold px-4 w-100">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5 pb-5">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4 pb-2 border-bottom">
        <h1 class="h2 fw-bold text-dark">Payout Management</h1>
    </div>

    <div class="card shadow-sm border-0 mt-4 overflow-hidden">
        <div class="card-body p-0 table-responsive text-nowrap">
            <table class="table table-hover table-striped mb-0 text-nowrap">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Winner Name</th>
                        <th>Prize Amount</th>
                        <th>Verification</th>
                        <th>Payout Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="w : ${winners}">
                        <td th:text="${w.id}" class="fw-bold">1</td>
                        <td th:text="${w.user.email}">winner@test.com</td>
                        <td class="fw-bold text-success" th:text="${'$' + w.drawResult.prizeAmount}">$1000</td>
                        <td>
                            <span class="badge bg-warning text-dark px-3 py-2 rounded-pill fw-bold shadow-sm" th:if="${w.verificationStatus.name() == 'PENDING_VERIFICATION'}">🔍 PENDING VETTING</span>
                            <span class="badge bg-success px-3 py-2 rounded-pill fw-bold shadow-sm" th:if="${w.verificationStatus.name() == 'VERIFIED'}">✅ VERIFIED</span>
                        </td>
                        <td>
                            <span class="badge bg-info px-3 py-2 rounded-pill fw-bold shadow-sm" th:if="${w.paymentStatus.name() == 'PENDING_VERIFICATION'}">🛒 QUEUED</span>
                            <span class="badge bg-success px-3 py-2 rounded-pill fw-bold shadow-sm" th:if="${w.paymentStatus.name() == 'PAID'}">💵 DISBURSED</span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-dark rounded-pill fw-bold px-4 py-1">View Proof</button>
                        </td>
                    </tr>
                    <tr th:if="${winners.isEmpty()}">
                        <td colspan="6" class="text-center py-5 fs-5">No winners recorded for current cycle.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
