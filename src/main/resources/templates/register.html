<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - GolfForGood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 30px;}
        .btn-primary { background-color: #2a5298; border: none; }
    </style>
</head>
<body>
<div class="card register-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #2a5298;">GolfForGood</h2>
        <p class="text-muted">Create an account to start playing</p>
    </div>
    
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control rounded-pill px-3" required>
            <span class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" th:field="*{password}" class="form-control rounded-pill px-3" required>
            <span class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Sign Up</button>
    </form>
    <div class="text-center mt-4">
        <p class="text-muted">Already have an account? <a href="/login" class="text-decoration-none fw-bold" style="color: #ff6b6b;">Log in</a></p>
    </div>
</div>
</body>
</html>
