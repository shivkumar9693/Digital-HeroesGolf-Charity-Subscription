<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - GolfForGood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root{
            --bg: #f8f9fa;
            --text: #0f172a;
            --brand: #2a5298;
            --brand-2: #1e3c72;
            --shadow: 0 26px 70px rgba(15, 23, 42, 0.16);
            --ring: 0 0 0 .25rem rgba(42, 82, 152, .22);
        }

        body{
            background:
                radial-gradient(900px 600px at 15% 0%, rgba(30,60,114,.10), transparent 60%),
                radial-gradient(900px 600px at 95% 5%, rgba(42,82,152,.10), transparent 55%),
                var(--bg);
            font-family: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text);
            text-rendering: optimizeLegibility;
        }

        .login-card{
            border: 0;
            border-radius: 18px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 34px;
            background: rgba(255,255,255,.92);
            animation: popIn .35s ease both;
            transform-origin: 50% 60%;
        }

        .form-control:focus{
            box-shadow: var(--ring);
            border-color: rgba(42, 82, 152, .35);
        }

        .btn{
            transition: transform .15s ease, box-shadow .15s ease, background-color .15s ease, border-color .15s ease, color .15s ease;
        }
        .btn:active{ transform: translateY(1px); }
        .btn:focus-visible{ box-shadow: var(--ring); }

        .btn-primary{
            background-color: var(--brand);
            border: none;
        }
        .btn-primary:hover{
            background-color: var(--brand-2);
        }

        .alert{
            border: 0;
            box-shadow: 0 14px 28px rgba(15,23,42,.10);
            animation: fadeUp .35s ease both;
        }

        @keyframes popIn{
            from{ opacity: 0; transform: translateY(10px) scale(.98); }
            to{ opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeUp{
            from{ opacity: 0; transform: translateY(8px); }
            to{ opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce){
            *{ animation: none !important; transition: none !important; scroll-behavior: auto !important; }
        }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold" style="color: #2a5298;">GolfForGood</h2>
        <p class="text-muted">Sign in to your account</p>
    </div>
    <div th:if="${param.error}" class="alert alert-danger">Invalid email or password.</div>
    <div th:if="${param.banned}" class="alert alert-warning fw-bold text-center">
        🚫 Your account has been banned.<br/>
        <small class="text-dark">Please contact support at <strong>admin@golfforgood.com</strong></small>
    </div>
    <div th:if="${param.success}" class="alert alert-success">Registration successful. Please log in.</div>
    <div th:if="${param.logout}" class="alert alert-info">You have been logged out.</div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Email</label>
            <input type="email" id="username" name="username" class="form-control rounded-pill px-3" required autofocus>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control rounded-pill px-3" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Login</button>
    </form>
    <div class="text-center mt-4">
        <p class="text-muted">Don't have an account? <a href="/register" class="text-decoration-none fw-bold" style="color: #ff6b6b;">Sign up</a></p>
    </div>
</div>
</body>
</html>
