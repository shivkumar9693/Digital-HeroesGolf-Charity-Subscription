<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - GolfForGood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif;}
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .nav-link { opacity: 0.8; transition: opacity 0.2s; }
        .nav-link:hover, .nav-link.active { opacity: 1; border-bottom: 2px solid white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3" style="background-color: #1e3c72 !important;">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="/dashboard">GolfForGood</a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#subscriberNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="subscriberNav">
            <ul class="navbar-nav align-items-lg-center mt-3 mt-lg-0">
                <li class="nav-item"><a class="nav-link fw-bold text-white px-3 active" href="/dashboard">Overview</a></li>
                <li class="nav-item"><a class="nav-link fw-bold text-white px-3" href="/dashboard/scores">My Scores</a></li>
                <li class="nav-item"><a class="nav-link fw-bold text-white px-3" href="/dashboard/charity-selection">My Charity</a></li>
                <li class="nav-item"><a class="nav-link fw-bold text-white px-3" href="/pricing">Subscription Plan</a></li>
                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light rounded-pill fw-bold px-4 w-100">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5 mb-5 pb-5">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center mb-4 pb-2 border-bottom">
        <h1 class="h2 text-dark fw-bold">Dashboard Overview</h1>
    </div>

    <div class="row">
        <!-- Status Card -->
        <div class="col-md-6 mb-4">
            <div class="card p-3 h-100">
                <div class="card-body">
                    <h5 class="card-title text-muted fw-bold">Subscription Status</h5>
                    <div class="d-flex align-items-center mt-4">
                        <div class="me-3 fs-1" th:if="${subscription != null and subscription.status.name() == 'ACTIVE'}">✨</div>
                        <div class="me-3 fs-1" th:if="${subscription == null or subscription.status.name() != 'ACTIVE'}">⚠️</div>
                        <div>
                            <h2 th:if="${subscription != null and subscription.status.name() == 'ACTIVE'}" class="text-success fw-bold mb-0">ACTIVE</h2>
                            <h2 th:if="${subscription == null or subscription.status.name() != 'ACTIVE'}" class="text-danger fw-bold mb-0">INACTIVE</h2>
                        </div>
                    </div>
                    <p th:if="${subscription != null}" class="text-muted mt-3 mb-0">Renews on: <strong th:text="${subscription.renewalDate}"></strong></p>
                    <a th:if="${subscription == null or subscription.status.name() != 'ACTIVE'}" href="/pricing" class="btn btn-primary mt-4 rounded-pill fw-bold px-4 w-100">Subscribe Now</a>
                </div>
            </div>
        </div>

        <!-- Scores Card -->
        <div class="col-md-6 mb-4">
            <div class="card p-3 h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="card-title text-muted fw-bold mb-0">Live Algorithm Log</h5>
                        <a href="/dashboard/scores" class="btn btn-sm btn-outline-primary rounded-pill fw-bold">View History</a>
                    </div>
                    
                    <ul class="list-group list-group-flush" th:if="${!scores.isEmpty()}">
                        <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent px-0 border-light" th:each="s : ${scores}">
                            <span class="text-secondary fw-bold" th:text="${s.scoreDate}">2024-01-01</span>
                            <span class="badge bg-primary rounded-pill px-3 py-2 fs-6 shadow-sm" th:text="${s.score}">36</span>
                        </li>
                    </ul>
                    <div class="text-center p-3 bg-light rounded mt-2" th:if="${scores.isEmpty()}">
                        <p class="text-muted mb-0 fw-bold">No scores entered yet.</p>
                    </div>
                    
                    <form th:action="@{/dashboard/scores}" method="post" class="mt-4 pt-3 border-top border-light">
                        <div class="input-group">
                            <input type="number" name="score" class="form-control border-end-0 bg-light" placeholder="Score (1-45)" min="1" max="45" required>
                            <input type="date" name="scoreDate" class="form-control bg-light" required>
                            <button class="btn btn-primary fw-bold px-4" type="submit">Log</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
