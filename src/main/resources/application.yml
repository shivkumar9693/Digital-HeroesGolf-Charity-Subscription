spring:
  application:
    name: golf-charity-subscription
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/golfcharity?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your_email}
    password: ${SMTP_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

stripe:
  api:
    public-key: ${STRIPE_PUBLIC_KEY:your_public_key_here}
    secret-key: ${STRIPE_SECRET_KEY:your_secret_key_here}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:your_webhook_secret_here}
  monthly-price-id: ${STRIPE_MONTHLY_PRICE_ID:your_monthly_price_id}
  yearly-price-id: ${STRIPE_YEARLY_PRICE_ID:your_yearly_price_id}

app:
  base-url: ${BASE_URL:http://localhost:8080}
 
server:
  port: ${PORT:8080}
