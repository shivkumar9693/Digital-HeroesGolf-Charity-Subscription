server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-stacktrace: always
  servlet:
    session:
      timeout: 15m
 
spring:
  application:
    name: golf-charity-subscription
  main:
    allow-bean-definition-overriding: true
  thymeleaf:
    cache: true
 
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
 
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
 
  mail:
    host: smtp-relay.brevo.com
    port: 2525
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 15000
          timeout: 15000
          writetimeout: 15000
 
stripe:
  api:
    public-key: ${STRIPE_PUBLIC_KEY:your_stripe_public_key}
    secret-key: ${STRIPE_SECRET_KEY:your_stripe_secret_key}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:your_webhook_secret_here}
  monthly-price-id: ${STRIPE_MONTHLY_PRICE_ID:price_1THI2c84DVOaveEmNNiglyw9}
  yearly-price-id: ${STRIPE_YEARLY_PRICE_ID:price_1THI4D84DVOaveEmZ3XS3zNd}
 
app:
  base-url: ${BASE_URL:http://localhost:8080}
  security:
    login:
      maxFailedAttempts: 5 
      captchaThreshold: 3  
      lockMinutes: 15      
    session:
      timeoutWarningSeconds: 60 
      maxConcurrentSessions: 1  
      expireOldSessionOnNewLogin: true
 
logging:
  level:
    org.springframework.security: INFO
    com.golfcharity: INFO
